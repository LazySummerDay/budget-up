<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamPipe</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        input { width: 80%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; margin-bottom: 10px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: #bb86fc; color: #000; font-weight: bold; cursor: pointer; }
        #video-container { margin-top: 20px; width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 12px; overflow: hidden; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        .overlay-btn { margin-top: 15px; background: #03dac6; display: block; width: 100%; }
        .instructions { font-size: 12px; color: #888; margin-top: 20px; text-align: left; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container">
        <h2>StreamPipe</h2>
        <input type="text" id="yt-url" placeholder="Paste YouTube Link here...">
        <button onclick="loadVideo()">Load Video</button>

        <div id="video-container">
            <div id="player"></div>
        </div>

        <button class="overlay-btn" onclick="goFullscreen()">1. Enter Fullscreen</button>
        
        <div class="instructions">
            <strong>How to Play Locked:</strong><br>
            1. Load video and tap Play.<br>
            2. Tap "Enter Fullscreen".<br>
            3. Lock your phone (audio will stop).<br>
            4. Tap your screen and hit <strong>Play</strong> on the Lock Screen widget.
        </div>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        let player;
        function onYouTubeIframeAPIReady() {
            // Player will be initialized when URL is loaded
        }

        function loadVideo() {
            const url = document.getElementById('yt-url').value;
            const videoId = extractId(url);
            
            if (videoId) {
                if (player) {
                    player.loadVideoById(videoId);
                } else {
                    player = new YT.Player('player', {
                        height: '100%',
                        width: '100%',
                        videoId: videoId,
                        playerVars: { 'playsinline': 1, 'controls': 1 },
                        events: { 'onStateChange': onPlayerStateChange }
                    });
                }
            }
        }

        function extractId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length == 11) ? match[2] : null;
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                // This tells iOS that "Official Media" is happening
                if ('mediaSession' in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: 'YouTube Stream',
                        artist: 'StreamPipe PWA',
                        artwork: [{ src: 'icon.png.jpeg', sizes: '512x512', type: 'image/jpeg' }]
                    });
                }
            }
        }

        function goFullscreen() {
            const iframe = document.querySelector('iframe');
            if (iframe.requestFullscreen) iframe.requestFullscreen();
            else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
            else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
        }
    </script>
</body>
</html>
