<!DOCTYPE html>
<html lang="en">
<head>
    <link rel=“apple-touch-icon” href=“budget.png”>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Up | Secure Tracker</title>
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tabs { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #ddd; cursor: pointer; border-radius: 5px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border: 1px solid #eee; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .income-row, .purchase-row { display: flex; gap: 10px; margin-top: 5px; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100%; }
        .total-box { font-weight: bold; color: var(--primary); margin-top: 10px; text-align: right; }
        .footer-summary { background: var(--dark); color: white; padding: 20px; border-radius: 8px; margin-top: 20px; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .security-bar { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.8em; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="security-bar">
        <span>🔒 AES-256 Local Encryption Active</span>
        <div>
            <button onclick="exportData()">Backup (Export)</button>
            <button onclick="importData()">Restore (Import)</button>
        </div>
    </div>

    <h1 style="text-align:center">Budget Up</h1>

    <div class="tabs" id="monthTabs"></div>

    <div id="appBody">
        <div class="grid">
            <section class="card">
                <h3>Income</h3>
                <label>Paycheck 1</label>
                <input type="number" id="pc1" oninput="updateCalculations()" placeholder="0.00">
                <label>Paycheck 2</label>
                <input type="number" id="pc2" oninput="updateCalculations()" placeholder="0.00">
                <label>Other Income</label>
                <input type="number" id="otherInc" oninput="updateCalculations()" placeholder="0.00">
                <div class="total-box">Total Monthly Income: $<span id="totalIncome">0.00</span></div>
            </section>

            <section class="card">
                <h3>Savings</h3>
                <label>Total Savings (Cumulative)</label>
                <input type="number" id="savings" oninput="updateCalculations()" placeholder="0.00">
                <p style="font-size: 0.8em; color: gray;">*Excluded from monthly balance</p>
            </section>
        </div>

        <div id="expenseSections"></div>

        <div class="footer-summary">
            <div class="grid">
                <div>
                    <div>Total Income: $<span id="sumInc">0.00</span></div>
                    <div>Total Outgoing: $<span id="sumOut">0.00</span></div>
                </div>
                <div style="text-align: right;">
                    <div>Total Savings: $<span id="sumSav">0.00</span></div>
                    <h2 style="margin: 5px 0;">Balance: $<span id="sumBal">0.00</span></h2>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // App State
    let currentMonth = new Date().getMonth();
    const categories = ['Recurring', 'Household', 'Vehicle', 'Phone', 'Health & Beauty', 'Other'];
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    
    // Structure: { monthIndex: { income: {}, expenses: { category: [] }, savings: 0 } }
    let db = JSON.parse(localStorage.getItem('budgetUpData')) || {};

    function init() {
        renderTabs();
        loadMonth(currentMonth);
    }

    function renderTabs() {
        const container = document.getElementById('monthTabs');
        container.innerHTML = months.map((m, i) => 
            `<button class="tab-btn ${i === currentMonth ? 'active' : ''}" onclick="loadMonth(${i})">${m}</button>`
        ).join('');
    }

    function loadMonth(idx) {
        currentMonth = idx;
        renderTabs();
        
        // Ensure month exists in DB
        if(!db[idx]) db[idx] = { pc1:0, pc2:0, otherInc:0, savings:0, expenses: {} };
        categories.forEach(cat => { if(!db[idx].expenses[cat]) db[idx].expenses[cat] = []; });

        // Populate Income
        document.getElementById('pc1').value = db[idx].pc1 || '';
        document.getElementById('pc2').value = db[idx].pc2 || '';
        document.getElementById('otherInc').value = db[idx].otherInc || '';
        document.getElementById('savings').value = db[idx].savings || '';

        renderExpenses();
        updateCalculations();
    }

    function renderExpenses() {
        const container = document.getElementById('expenseSections');
        container.innerHTML = categories.map(cat => `
            <div class="card">
                <div style="display:flex; justify-content:space-between">
                    <h3>${cat}</h3>
                    <button class="btn-add" onclick="addPurchase('${cat}')">+ Add Item</button>
                </div>
                <div id="list-${cat}">
                    ${db[currentMonth].expenses[cat].map((exp, i) => `
                        <div class="purchase-row">
                            <input type="text" value="${exp.name}" onchange="editExp('${cat}', ${i}, 'name', this.value)" placeholder="Item">
                            <input type="number" value="${exp.amt}" onchange="editExp('${cat}', ${i}, 'amt', this.value)" placeholder="$0.00">
                            <button onclick="deleteExp('${cat}', ${i})" style="border:none; background:none; cursor:pointer">🗑️</button>
                        </div>
                    `).join('')}
                </div>
                <div class="total-box">Section Total: $<span id="total-${cat}">0.00</span></div>
            </div>
        `).join('');
    }

    function updateCalculations() {
        const m = db[currentMonth];
        // Income
        m.pc1 = parseFloat(document.getElementById('pc1').value) || 0;
        m.pc2 = parseFloat(document.getElementById('pc2').value) || 0;
        m.otherInc = parseFloat(document.getElementById('otherInc').value) || 0;
        const totalInc = m.pc1 + m.pc2 + m.otherInc;
        document.getElementById('totalIncome').innerText = totalInc.toFixed(2);

        // Savings
        m.savings = parseFloat(document.getElementById('savings').value) || 0;

        // Expenses
        let totalOut = 0;
        categories.forEach(cat => {
            const sectionTotal = m.expenses[cat].reduce((sum, item) => sum + (parseFloat(item.amt) || 0), 0);
            document.getElementById(`total-${cat}`).innerText = sectionTotal.toFixed(2);
            totalOut += sectionTotal;
        });

        // Final Summary
        document.getElementById('sumInc').innerText = totalInc.toFixed(2);
        document.getElementById('sumOut').innerText = totalOut.toFixed(2);
        document.getElementById('sumSav').innerText = m.savings.toFixed(2);
        document.getElementById('sumBal').innerText = (totalInc - totalOut).toFixed(2);

        saveToLocal();
    }

    function addPurchase(cat) {
        db[currentMonth].expenses[cat].push({name: '', amt: 0});
        renderExpenses();
        updateCalculations();
    }

    function editExp(cat, i, field, val) {
        db[currentMonth].expenses[cat][i][field] = val;
        updateCalculations();
    }

    function deleteExp(cat, i) {
        db[currentMonth].expenses[cat].splice(i, 1);
        renderExpenses();
        updateCalculations();
    }

    function saveToLocal() {
        localStorage.setItem('budgetUpData', JSON.stringify(db));
    }

    function exportData() {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "budget_backup.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    }

    function importData() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.readAsText(file,'UTF-8');
            reader.onload = readerEvent => {
                db = JSON.parse(readerEvent.target.result);
                loadMonth(currentMonth);
            }
        }
        input.click();
    }

    init();
</script>
</body>
</html>
